<!doctype html>
<html lang="ja">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Mizuta MAP</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/maplibre-gl@5.6.0/dist/maplibre-gl.css" />
    <link rel="stylesheet" href="./styles.css?v=20260723-avatar-picker" />
  </head>
  <body>
    <main id="app">
      <section id="screen-home" class="screen screen-home" data-screen="home">
        <div id="map" aria-label="Mizuta MAP"></div>

        <button id="locateBtn" class="map-locate-button" type="button" aria-label="自分のアイコンを変える" title="自分のアイコンを変える" aria-expanded="false" aria-controls="avatarPicker">
          <svg viewBox="0 0 24 24" aria-hidden="true" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <circle cx="12" cy="5" r="1"></circle>
            <path d="m9 20 3-6 3 6"></path>
            <path d="m6 8 6 2 6-2"></path>
            <path d="M12 10v4"></path>
          </svg>
        </button>

        <div id="avatarPicker" class="map-avatar-picker" hidden>
          <label for="playerAvatarInput">自分のすがた</label>
          <select id="playerAvatarInput">
            <option value="shrimp">えび</option>
            <option value="crab">かに</option>
            <option value="octopus">たこ</option>
          </select>
          <button id="avatarApplyBtn" class="avatar-apply-button" type="button">表示</button>
        </div>

        <section class="panel" aria-label="操作パネル">
          <div>
            <p class="eyebrow">Mizuta MAP</p>
            <h1>Mizuta MAP</h1>
          </div>

          <div class="stats">
            <span id="sourceBadge">読み込み中</span>
            <strong id="puddleCount">0</strong>
            <span>spots</span>
          </div>

          <div class="home-toolbar">
            <button id="filterToggleBtn" class="icon-button" type="button" aria-expanded="false" aria-controls="homeFilterPanel" title="絞り込み">🔎</button>
            <span id="filterSummary" class="filter-summary">全件表示</span>
          </div>

          <form id="homeFilterPanel" class="filter-panel" hidden>
            <div class="filter-grid">
              <label for="minSizeInput">
                <span>最小</span>
                <input id="minSizeInput" type="number" min="1" max="1000" inputmode="numeric" placeholder="cm" />
              </label>
              <label for="maxSizeInput">
                <span>最大</span>
                <input id="maxSizeInput" type="number" min="1" max="1000" inputmode="numeric" placeholder="cm" />
              </label>
              <label for="transparencyFilterInput">
                <span>透明度</span>
                <select id="transparencyFilterInput">
                  <option value="">すべて</option>
                  <option value="5">5</option>
                  <option value="4">4</option>
                  <option value="3">3</option>
                  <option value="2">2</option>
                  <option value="1">1</option>
                </select>
              </label>
              <label for="observedDaysInput">
                <span>観測</span>
                <select id="observedDaysInput">
                  <option value="7">7日以内</option>
                  <option value="3">3日以内</option>
                  <option value="1">24時間以内</option>
                  <option value="">すべて</option>
                </select>
              </label>
            </div>
            <div class="filter-actions">
              <button id="resetFiltersBtn" class="secondary" type="button">リセット</button>
              <button type="submit">適用</button>
            </div>
          </form>

          <div class="segmented" role="group" aria-label="表示モード">
            <button id="playViewBtn" type="button">あそぶ</button>
            <button id="mapViewBtn" type="button">マップ</button>
          </div>

          <div class="actions">
            <button id="clickModeBtn" type="button">地図をクリックして投稿</button>
            <button id="addHereBtn" class="secondary" type="button">現在地で投稿</button>
            <button id="clearBtn" class="danger" type="button">自分の投稿を消す</button>
          </div>

          <p id="status" class="status">地図を読み込み中...</p>
        </section>

        <aside class="data-box" aria-label="水たまりデータ" aria-hidden="true" hidden>
          <pre id="dataBox">[]</pre>
        </aside>
      </section>

      <section id="screen-post" class="screen screen-form" data-screen="post" hidden>
        <form class="post-card" id="postForm">
          <div class="post-top">
            <button id="cancelPostBtn" class="icon-button" type="button" aria-label="戻る">‹</button>
            <p id="placeText" class="post-location">位置情報が必要です</p>
          </div>

          <section class="post-section" aria-label="写真">
            <input id="photoInput" class="visually-hidden" type="file" accept="image/*" capture="environment" />
            <input id="photoLibraryInput" class="visually-hidden" type="file" accept="image/*" />
            <div class="photo-field">
              <span id="photoLabel" class="photo-label" aria-live="polite">写真</span>
              <div class="photo-actions">
                <button id="cameraPickBtn" class="subtle-button" type="button">撮影</button>
                <button id="libraryPickBtn" class="subtle-button" type="button">アップロード</button>
              </div>
            </div>
          </section>

          <section class="post-section" aria-label="大きさ">
            <div class="size-options">
              <label><input type="radio" name="size" value="100" />約1m以下</label>
              <label><input type="radio" name="size" value="200" />約2m</label>
              <label><input type="radio" name="size" value="300" />約3m</label>
              <label><input type="radio" name="size" value="400" />約4m以上</label>
            </div>
          </section>

          <section class="post-section" aria-label="透明度">
            <input id="transparencyInput" class="transparency-range" type="range" min="1" max="10" step="1" value="1" aria-label="透明度" />
          </section>

          <section class="post-section" aria-label="観測日時">
            <input id="observedAtInput" class="date-calendar" type="date" aria-label="観測日時" />
          </section>

          <div class="modal-actions">
            <button id="submitPostBtn" class="post-submit" type="submit" disabled>投稿</button>
          </div>
        </form>
      </section>

      <section id="screen-ar" class="screen screen-ar" data-screen="ar" hidden>
        <video id="arCamera" class="camera-preview" autoplay muted playsinline></video>
        <canvas id="arCanvas" class="ar-canvas" aria-hidden="true"></canvas>
        <div id="arFallbackFish" class="ar-fish" aria-hidden="true">🐟</div>
        <div id="arReticle" class="ar-reticle" aria-hidden="true"></div>
        <div class="ar-copy">
          <p id="arStatus" class="ar-status">AR</p>
          <p id="arHint" class="ar-hint">床や水たまりにスマホを向けてください</p>
        </div>
      </section>

      <footer id="app-footer" aria-label="画面切り替え">
        <button type="button" data-nav="home" aria-current="page">HOME</button>
        <button type="button" data-nav="post">投稿</button>
        <button type="button" data-nav="ar">AR</button>
      </footer>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/maplibre-gl@5.6.0/dist/maplibre-gl.js"></script>
    <script src="./app.js?v=20260723-avatar-picker"></script>
  </body>
</html>
