<!doctype html>
<html lang="ja">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>雨あと水族館</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/maplibre-gl@5.6.0/dist/maplibre-gl.css" />
    <link rel="stylesheet" href="./styles.css?v=20260715" />
  </head>
  <body>
    <main id="map" aria-label="水たまりマップ"></main>

    <section class="panel" aria-label="操作パネル">
      <div>
        <p class="eyebrow">Mizutamari Map</p>
        <h1>雨あと水族館</h1>
      </div>

      <div class="stats">
        <span id="sourceBadge">読み込み中</span>
        <strong id="puddleCount">0</strong>
        <span>spots</span>
      </div>

      <div class="segmented" role="group" aria-label="表示モード">
        <button id="playViewBtn" class="active" type="button">あそぶ</button>
        <button id="mapViewBtn" type="button">マップ</button>
      </div>

      <div class="actions">
        <button id="clickModeBtn" type="button">地図をクリックして投稿</button>
        <button id="locateBtn" class="secondary" type="button">現在地を見る</button>
        <button id="addHereBtn" class="secondary" type="button">現在地で投稿</button>
        <button id="clearBtn" class="danger" type="button">自分の投稿を消す</button>
      </div>

      <label class="avatar-row">
        <span>自分のすがた</span>
        <select id="playerAvatarInput">
          <option value="shrimp">えび</option>
          <option value="crab">かに</option>
          <option value="octopus">たこ</option>
        </select>
      </label>

      <p id="status" class="status">地図を読み込み中...</p>
    </section>

    <aside class="data-box" aria-label="水たまりデータ">
      <pre id="dataBox">[]</pre>
    </aside>

    <div class="modal-bg" id="modalBg" role="dialog" aria-modal="true" aria-labelledby="modalTitle">
      <form class="modal" id="postForm">
        <h2 id="modalTitle">水たまりを投稿</h2>
        <p id="placeText">位置を選択中...</p>

        <label for="diameterInput">直径</label>
        <div class="diameter-row">
          <input id="diameterInput" type="number" min="1" max="1000" value="120" />
          <span>cm</span>
        </div>

        <label for="turbidityInput">濁り具合</label>
        <select id="turbidityInput">
          <option value="clear">すきとおり</option>
          <option value="cloudy" selected>ちょいにごり</option>
          <option value="muddy">にごり</option>
        </select>

        <label for="reviewInput">水たまりレビュー</label>
        <textarea id="reviewInput" placeholder="例：アメンボがいました。光が反射してきれいでした。"></textarea>

        <label for="photoInput">写真</label>
        <input id="photoInput" type="file" accept="image/*" />

        <label class="check-row">
          <input id="contestInput" type="checkbox" />
          <span>水たまりフォトコンテストに応募する</span>
        </label>

        <div class="modal-actions">
          <button id="cancelPostBtn" class="danger" type="button">やめる</button>
          <button type="submit">投稿する</button>
        </div>
      </form>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/maplibre-gl@5.6.0/dist/maplibre-gl.js"></script>
    <script src="./app.js?v=20260715"></script>
  </body>
</html>
