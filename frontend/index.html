<!doctype html>
<html lang="ja">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>雨あと水族館</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/maplibre-gl@5.6.0/dist/maplibre-gl.css" />
    <link rel="stylesheet" href="./styles.css?v=20260723-1" />
  </head>
  <body>
    <main id="app">
      <section id="screen-home" class="screen screen-home" data-screen="home">
        <div id="map" aria-label="水たまりマップ"></div>

        <section class="panel" aria-label="操作パネル">
          <div>
            <p class="eyebrow">Mizutamari Map</p>
            <h1>雨あと水族館</h1>
          </div>

          <div class="stats">
            <span id="sourceBadge">読み込み中</span>
            <strong id="puddleCount">0</strong>
            <span>spots</span>
          </div>

          <div class="home-toolbar">
            <button id="filterToggleBtn" class="icon-button" type="button" aria-expanded="false" aria-controls="homeFilterPanel" title="絞り込み">🔎</button>
            <span id="filterSummary" class="filter-summary">全件表示</span>
          </div>

          <form id="homeFilterPanel" class="filter-panel" hidden>
            <div class="filter-grid">
              <label for="minSizeInput">
                <span>最小</span>
                <input id="minSizeInput" type="number" min="1" max="1000" inputmode="numeric" placeholder="cm" />
              </label>
              <label for="maxSizeInput">
                <span>最大</span>
                <input id="maxSizeInput" type="number" min="1" max="1000" inputmode="numeric" placeholder="cm" />
              </label>
              <label for="transparencyFilterInput">
                <span>透明度</span>
                <select id="transparencyFilterInput">
                  <option value="">すべて</option>
                  <option value="5">5</option>
                  <option value="4">4</option>
                  <option value="3">3</option>
                  <option value="2">2</option>
                  <option value="1">1</option>
                </select>
              </label>
              <label for="observedDaysInput">
                <span>観測</span>
                <select id="observedDaysInput">
                  <option value="7">7日以内</option>
                  <option value="3">3日以内</option>
                  <option value="1">24時間以内</option>
                  <option value="">すべて</option>
                </select>
              </label>
            </div>
            <div class="filter-actions">
              <button id="resetFiltersBtn" class="secondary" type="button">リセット</button>
              <button type="submit">適用</button>
            </div>
          </form>

          <div class="segmented" role="group" aria-label="表示モード">
            <button id="playViewBtn" class="active" type="button">あそぶ</button>
            <button id="mapViewBtn" type="button">マップ</button>
          </div>

          <div class="actions">
            <button id="clickModeBtn" type="button">地図をクリックして投稿</button>
            <button id="locateBtn" class="secondary" type="button">現在地を見る</button>
            <button id="addHereBtn" class="secondary" type="button">現在地で投稿</button>
            <button id="clearBtn" class="danger" type="button">自分の投稿を消す</button>
          </div>

          <label class="avatar-row">
            <span>自分のすがた</span>
            <select id="playerAvatarInput">
              <option value="shrimp">えび</option>
              <option value="crab">かに</option>
              <option value="octopus">たこ</option>
            </select>
          </label>

          <p id="status" class="status">地図を読み込み中...</p>
        </section>

        <aside class="data-box" aria-label="水たまりデータ" aria-hidden="true" hidden>
          <pre id="dataBox">[]</pre>
        </aside>
      </section>

      <section id="screen-post" class="screen screen-form" data-screen="post" hidden>
        <video id="postCamera" class="camera-preview" autoplay muted playsinline></video>
        <form class="post-card" id="postForm">
          <h2 id="postTitle">投稿</h2>
          <p id="placeText" class="status">現在地を使って投稿します。</p>

          <label for="diameterInput">大きさ</label>
          <div class="diameter-row">
            <input id="diameterInput" type="number" min="1" max="1000" value="120" />
            <span>cm</span>
          </div>

          <label for="transparencyInput">透明度</label>
          <select id="transparencyInput">
            <option value="5">5</option>
            <option value="4">4</option>
            <option value="3" selected>3</option>
            <option value="2">2</option>
            <option value="1">1</option>
          </select>

          <label for="observedAtInput">観測日時</label>
          <input id="observedAtInput" type="datetime-local" />

          <label for="reviewInput">コメント</label>
          <textarea id="reviewInput" placeholder="水たまりの様子"></textarea>

          <label for="photoInput">写真</label>
          <input id="photoInput" type="file" accept="image/*" capture="environment" />

          <div class="modal-actions">
            <button id="cancelPostBtn" class="danger" type="button">やめる</button>
            <button type="submit">投稿する</button>
          </div>
        </form>
      </section>

      <section id="screen-ar" class="screen screen-ar" data-screen="ar" hidden>
        <video id="arCamera" class="camera-preview" autoplay muted playsinline></video>
        <div class="ar-fish" aria-hidden="true">🐟</div>
        <p id="arStatus" class="ar-status">AR</p>
      </section>

      <footer id="app-footer" aria-label="画面切り替え">
        <button type="button" data-nav="home" aria-current="page">HOME</button>
        <button type="button" data-nav="post">投稿</button>
        <button type="button" data-nav="ar">AR</button>
      </footer>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/maplibre-gl@5.6.0/dist/maplibre-gl.js"></script>
    <script src="./app.js?v=20260723-1"></script>
  </body>
</html>
